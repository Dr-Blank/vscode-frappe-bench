name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release & Publish to Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect release type
        id: release_type
        run: |
          MINOR=$(node -p "require('./package.json').version.split('.')[1]")
          if [ $((MINOR % 2)) -ne 0 ]; then
            echo "pre_release=true" >> "$GITHUB_OUTPUT"
            echo "vsce_flags=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "pre_release=false" >> "$GITHUB_OUTPUT"
            echo "vsce_flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Package extension
        run: npx @vscode/vsce package ${{ steps.release_type.outputs.vsce_flags }}

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish ${{ steps.release_type.outputs.vsce_flags }} --packagePath ${{ steps.vsix.outputs.file }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.vsix.outputs.file }}
          prerelease: ${{ steps.release_type.outputs.pre_release }}
          generate_release_notes: true

